<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác thực truy cập - Hệ thống đăng ký OpenAI</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>"
    />
    <style>
      .login-wrap {
        max-width: 420px;
        margin: 12vh auto 0;
      }
      .login-card {
        padding: var(--spacing-lg);
      }
      .login-title {
        margin-bottom: var(--spacing-sm);
      }
      .login-subtitle {
        color: var(--text-secondary);
        margin-bottom: var(--spacing-lg);
      }
      .login-error {
        background: var(--danger-light);
        color: var(--danger-color);
        border: 1px solid var(--danger-color);
        padding: var(--spacing-sm) var(--spacing-md);
        border-radius: var(--radius);
        margin-bottom: var(--spacing-md);
        font-size: 0.875rem;
      }
      .login-notice {
        background: var(--info-light);
        color: var(--info-color);
        border: 1px solid var(--info-color);
        padding: var(--spacing-sm) var(--spacing-md);
        border-radius: var(--radius);
        margin-bottom: var(--spacing-md);
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-wrap">
        <div class="card login-card">
          <div class="card-header">
            <h3 class="login-title">🔒 Xác thực truy cập</h3>
            <span class="hint">Vui lòng nhập mật khẩu truy cập để tiếp tục</span>
          </div>
          <div class="card-body">
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %} {% if notice %}
            <div class="login-notice">{{ notice }}</div>
            {% endif %}
            <form method="post" action="/login">
              <input type="hidden" name="next" value="{{ next }}" />
              <div class="form-group">
                <label for="password">Mật khẩu truy cập</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  autocomplete="current-password"
                  required
                  autofocus
                />
              </div>
              <div class="form-actions" style="margin-top: var(--spacing-lg)">
                <button type="submit" class="btn btn-primary" style="width: 100%">
                  Xác nhận và truy cập
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    {% include "partials/site_footer.html" %}
  </body>
</html>
